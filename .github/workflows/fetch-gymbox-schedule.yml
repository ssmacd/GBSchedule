name: Fetch GymBox Schedule

on:
  schedule:
    - cron: '0 4 * * *' # 4am UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch GymBox class schedule
        run: python3 fetch_gymbox_schedule.py

      - name: Commit updated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gymbox-schedule.json
          git diff --cached --quiet || git commit -m "chore: update GymBox schedule at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push
